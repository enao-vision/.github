name: PR Checks

on:
  workflow_call:
    secrets:
      inherit: true

jobs:
  claude:
    uses: enao-vision/.github/.github/workflows/pr-review.yml@main
    secrets: inherit

  deps:
    uses: enao-vision/.github/.github/workflows/dependency-review.yml@main

  release-notes-preview:
    if: github.base_ref == 'main'
    uses: enao-vision/.github/.github/workflows/release-notes-preview.yml@main
    secrets: inherit