name: Claude Code Review

on:
  workflow_call:
    secrets:
      anthropic_api_key:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
