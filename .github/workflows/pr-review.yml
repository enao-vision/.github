name: Code Review

on:
  workflow_call:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed so Claude can see the full diff vs main
          
      - name: Review Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Please review this pull request. Focus on:
            - Bugs or logic errors
            - Security issues
            - Code quality and maintainability
            - Missing error handling
            Keep feedback concise and constructive.
